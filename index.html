<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risy Anisa - Bio Link</title>

    <!-- Mengimpor Font Premium dari Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        /* ==========================================================================
       1. VARIABEL & RESET DASAR
       ========================================================================== */
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --bg-gradient: radial-gradient(circle at top, #111827 0%, #030712 100%);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-hover-bg: rgba(255, 255, 255, 0.08);
            --glass-hover-border: rgba(255, 255, 255, 0.2);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --font-family: 'Plus Jakarta Sans', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
            overflow-x: hidden;
            position: relative;
        }

        /* Dekorasi Background Latar Belakang (Lampu Cahaya Ambient) */
        body::before,
        body::after {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            opacity: 0.15;
            pointer-events: none;
        }

        body::before {
            background: #6366f1;
            top: 15%;
            left: 10%;
        }

        body::after {
            background: #a855f7;
            bottom: 15%;
            right: 10%;
        }

        /* ==========================================================================
       2. STRUKTUR UTAMA (CARD CONTAINER)
       ========================================================================== */
        .container {
            width: 100%;
            max-width: 480px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            box-shadow: var(--shadow);
            text-align: center;
            z-index: 1;
            animation: fadeInUp 0.8s ease-out;
        }

        /* Animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ==========================================================================
       3. HEADER (FOTO PROFIL, NAMA, BIO)
       ========================================================================== */
        header {
            margin-bottom: 2rem;
        }

        .avatar-wrapper {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 1.25rem;
            border-radius: 50%;
            padding: 3px;
            background: var(--primary-gradient);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }

        .avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            background: #1f2937;
            display: block;
            border: 3px solid #0b0f19;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #ffffff, #d1d5db);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .bio {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
            font-weight: 400;
            max-width: 320px;
            margin: 0 auto;
        }

        /* ==========================================================================
       4. TOMBOL-TOMBOL LINK (NAVIGATION)
       ========================================================================== */
        .links-nav {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            padding: 1rem 1.5rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        /* Efek Glow & Transform saat Hover */
        .link-item:hover {
            background: var(--glass-hover-bg);
            border-color: var(--glass-hover-border);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        /* Overlay Gradient Halus saat Hover */
        .link-item::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(255, 255, 255, 0.05),
                    transparent);
            transition: 0.5s;
        }

        .link-item:hover::before {
            left: 100%;
        }

        /* Ikon Kustom */
        .link-icon {
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .link-item:hover .link-icon {
            transform: scale(1.15) rotate(5deg);
        }

        /* Warna khusus untuk menonjolkan link utama */
        .link-item.featured {
            background: var(--primary-gradient);
            border: none;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .link-item.featured:hover {
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5);
        }

        /* ==========================================================================
       5. FOOTER & HAK CIPTA
       ========================================================================== */
        footer {
            margin-top: 2.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 1.5rem;
        }

        .footer-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        .footer-text span {
            color: #ef4444;
            /* Warna merah hati */
            animation: heartbeat 1.5s infinite;
            display: inline-block;
        }

        @keyframes heartbeat {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.2);
            }
        }

        /* ==========================================================================
       6. RESPONSIVENESS (MEDIA QUERIES)
       ========================================================================== */
        @media (max-width: 480px) {
            body {
                padding: 1rem 0.5rem;
            }

            .container {
                padding: 2rem 1.25rem;
                border-radius: 20px;
            }

            h1 {
                font-size: 1.35rem;
            }

            .bio {
                font-size: 0.85rem;
            }

            .link-item {
                padding: 0.875rem 1.25rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body>

    <!-- Card Utama Bio Link -->
    <div class="container">

        <!-- Bagian Atas: Profil -->
        <header>
            <div class="avatar-wrapper">
                <!-- Foto Profil Avatar -->
                <img src="foto.jpeg" alt="Foto Profil Risya nisa" class="avatar">

            <h1>Risya nisa</h1>
            <p class="bio">Belajar HTML & CSS dasar • Junior Web Developer enthusiast dari SurosoWan Cyber</p>
        </header>

        <!-- Bagian Tengah: Daftar Link Utama -->
        <main>
            <nav class="links-nav">

                <!-- Link Portofolio (Featured Link) -->
                <a href="https://www.youtube.com/" target="_blank" rel="noopener noreferrer" class="link-item featured">
                    <svg class="link-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"

                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path
                            d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.2 1.85v4">
                        </path>
                        <path d="M9 18c-4.51 2-5-2-7-2"></path>
                    </svg>
                    GitHub Profile
                </a>

                <!-- Link LinkedIn -->
                <a href="https://www.linkedin.com/in/risya-sholehatun-nisa-0771a0248/" target="_blank"
                    rel="noopener noreferrer" class="link-item">
                    <svg class="link-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"

                        <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path>
                        <rect width="4" height="12" x="2" y="9"></rect>

                <!-- Link Instagram -->
                <a href="https://www.canva.com/" target="_blank" rel="noopener noreferrer" class="link-item">

                        <line x1="17.5" x2="17.51" y1="6.5" y2="6.5"></line>
                    </svg>
                    Instagram
                </a>

            </nav>
        </main>

        <!-- Bagian Bawah: Footer & Hak Cipta -->
        <footer>
            <p class="footer-text">© 2026 Risya nisa. Dibuat dengan <span>♥</span> di Suroso Wan Cyber</p>
        </footer>

    </div>

</body>

</html>
